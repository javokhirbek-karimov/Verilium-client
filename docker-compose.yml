services:
  verilium-client:
    container_name: verilium-client
    restart: always
    image: node:20.10.0
    ports:
      - "4007:3015"

    environment:
      - PORT=3015

    volumes:
      - ./:/usr/src/verilium-client
    working_dir: /usr/src/verilium-client

    networks:
      - client-network

    # FOR PRODUCTION
    command: bash -c "yarn && yarn run build && yarn run start"

networks:
  client-network:
    driver: bridge
